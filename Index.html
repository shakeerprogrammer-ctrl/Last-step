<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Men's Outfit Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #1a1d24;
  padding: 20px;
  border-radius: 12px;
}

select, button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

select {
  background: #2a2f3a;
  color: white;
}

button {
  background: #cfa24a;
  color: black;
  font-weight: bold;
}

.step {
  display: none;
}

.step.active {
  display: block;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

/* Fullscreen image */
#fullView {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#fullView img {
  width: 90%;
  max-width: 500px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
<h1>MEN'S OUTFIT FINDER</h1>

<div id="steps" class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
  <h3>Select Climate</h3>
  <select id="climate">
    <option value="">Choose Climate</option>
    <option value="summer">Summer</option>
    <option value="winter">Winter</option>
    <option value="rainy">Rainy</option>
  </select>
  <button onclick="nextStep(1)">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h3>Select Occasion</h3>
  <select id="occasion">
    <option value="">Choose Occasion</option>
    <option value="date">Date</option>
    <option value="casual">Casual</option>
    <option value="formal">Formal</option>
    <option value="business">Business</option>
  </select>
  <button onclick="nextStep(2)">Next</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <h3>Select Place</h3>
  <select id="place">
    <option value="">Choose Place</option>
    <option value="coffee">Coffee Shop</option>
    <option value="office">Office</option>
    <option value="college">College</option>
    <option value="restaurant">Restaurant</option>
  </select>
  <button onclick="showOutfits()">Find Outfit</button>
</div>

</div>

<div id="gallery" class="gallery"></div>

</div>

<!-- Fullscreen -->
<div id="fullView" onclick="closeFullView()">
  <img id="fullImage">
</div>

<script>
function nextStep(step) {
  if (step === 1 && !document.getElementById("climate").value) {
    alert("Select Climate");
    return;
  }
  if (step === 2 && !document.getElementById("occasion").value) {
    alert("Select Occasion");
    return;
  }

  document.getElementById("step" + step).classList.remove("active");
  document.getElementById("step" + (step + 1)).classList.add("active");
}

function showOutfits() {
  const climate = document.getElementById("climate").value;
  const occasion = document.getElementById("occasion").value;
  const place = document.getElementById("place").value;

  if (!place) {
    alert("Select Place");
    return;
  }

  // Hide steps
  document.getElementById("steps").style.display = "none";

  const prefix = place + "-" + occasion;
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const totalImages = 10;

  for (let i = 1; i <= totalImages; i++) {
    const num = i.toString().padStart(2, "0");
    const src = `${prefix}${num}.jpg`;

    const img = document.createElement("img");
    img.src = src;

    img.onerror = function() {
      this.style.display = "none";
    };

    img.onclick = function() {
      openFullView(src);
    };

    gallery.appendChild(img);
  }
}

function openFullView(src) {
  document.getElementById("fullImage").src = src;
  document.getElementById("fullView").style.display = "flex";
}

function closeFullView() {
  document.getElementById("fullView").style.display = "none";
}
</script>

</body>
</html>
